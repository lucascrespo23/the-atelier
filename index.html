  const file = input.files[0];
  if (!file) return;
  
  const attachment = { type: 'file', name: file.name, url: '#', addedBy: requesterPerson || 'Requester', addedAt: new Date().toISOString().split('T')[0] };
  requesterAttachments.push(attachment);
  
  // Upload to storage
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': file.type, 'x-filename': file.name },
      body: file
    });
    const data = await res.json();
    if (data.url) attachment.url = data.url;
  } catch(e) { console.warn('Upload failed:', e); }
  
  // Show in chat
  const container = document.getElementById('requesterMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<i data-lucide="paperclip" class="icon icon-sm"></i> <strong>${file.name}</strong>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  lucide.createIcons();
  
  // Tell the AI about it
  requesterHistory.push({ role: 'user', content: `[Attached file: ${file.name}]` });
  
  // AI acknowledges
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
  
  callClaude(getRequesterSystemPrompt(), requesterHistory, 128).then(reply => {
    typing.remove();
    requesterHistory.push({ role: 'assistant', content: reply });
    _addMsg(container, reply, 'ai');
  }).catch(() => {
    typing.remove();
    _addMsg(container, 'Got it, file noted.', 'ai');
  });
  
  input.value = '';
}

async function requesterSend() {
  const input = document.getElementById('requesterInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  addMsg('requesterMessages', msg, 'user');
  
  requesterHistory.push({ role: 'user', content: msg });
  
  const container = document.getElementById('requesterMessages');
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
  
  try {
    const reply = await callClaude(getRequesterSystemPrompt(), requesterHistory, 256);
    typing.remove();
    requesterHistory.push({ role: 'assistant', content: reply });
    
    // Parse [REQUEST_COMPLETE] if present
    if (reply.includes('[REQUEST_COMPLETE]')) {
      const lines = reply.split('\n');
      const data = {};
      for (const line of lines) {
        const m = line.match(/^\s*(Title|Purpose|Format|Deadline|Copy|Requester|Department|Checklist):\s*(.+)/i);
        if (m) data[m[1].toLowerCase()] = m[2].trim();
      }
      
      if (data.title) {
        // Save person
        if (data.requester) {
          requesterPerson = data.requester;
          savePerson(data.requester, { department: data.department || '' });
        }
        
        // Parse checklist items
        let checklist = [];
        if (data.checklist) {
          checklist = data.checklist.split('|').map(item => ({
            text: item.trim(),
            done: false
          })).filter(item => item.text.length > 0);
        }
        
        // Create task
        const taskNum = Object.keys(STATE.tasks).length + 1;
        const taskId = 'ATL-' + String(taskNum).padStart(3, '0');
        STATE.tasks[taskId] = {
          id: taskId, title: data.title, assignee: null, type: 'queue',
          status: 'queued', progress: 0, due: data.deadline || 'TBD',
          requester: data.requester || 'Unknown', requestedBy: data.requester || 'Unknown',
          brief: `${data.purpose || ''}. Format: ${data.format || 'TBD'}.`,
          priority: 'medium', urgency: data.urgency || 'standard',
          checklist: checklist, attachments: [...requesterAttachments],
          conversationHistory: [...requesterHistory]
        };
        saveState();
        renderBoard();
        renderRequesterQueue();
        requesterAttachments = []; // Reset for next request
        
        // Show toast notification
        showToast('New request: ' + data.title, 'var(--green)');
      }
      
      // Show a clean version (remove the raw tag block, show summary card)
      const cleanReply = reply.replace(/\[REQUEST_COMPLETE\][\s\S]*$/, '').trim();
      let displayMsg = cleanReply || 'Your request has been submitted.';
      if (data.title) {
        const queuePos = Object.values(STATE.tasks).filter(t => t.type === 'queue').length;
        displayMsg += `\n\n<div class="summary-card">`;
        displayMsg += `<div class="sc-title">${data.title}</div>`;
        if (data.purpose) displayMsg += `<div class="sc-row"><span><i data-lucide="clipboard" class="icon icon-sm"></i></span> ${data.purpose}</div>`;
        if (data.format) displayMsg += `<div class="sc-row"><span><i data-lucide="ruler" class="icon icon-sm"></i></span> ${data.format}</div>`;
        if (data.deadline) displayMsg += `<div class="sc-row"><span><i data-lucide="calendar" class="icon icon-sm"></i></span> ${data.deadline}</div>`;
        displayMsg += `<div class="sc-row"><span><i data-lucide="pen-tool" class="icon icon-sm"></i></span> Copy: ${data.copy || 'unknown'}</div>`;
        displayMsg += `</div>\n\nYou're <strong>#${queuePos}</strong> in the queue.`;
      }
      _addMsg(container, displayMsg, 'ai');
    } else {
      // Try to detect person name from early conversation for memory
      if (!requesterPerson && requesterHistory.length <= 6) {
        // Simple heuristic: if user gave a short response (likely a name) early on
        const userMsgs = requesterHistory.filter(m => m.role === 'user');
        if (userMsgs.length === 2 && userMsgs[1].content.split(' ').length <= 3) {
          const name = userMsgs[1].content.replace(/^(i'm |my name is |it's |hey,? i'm )/i, '').replace(/[.!]$/,'').trim();
          if (name.length > 1 && name.length < 30) {
            requesterPerson = name;
            savePerson(name, {});
          }
        }
      }
      _addMsg(container, reply, 'ai');
    }
  } catch(e) {
    typing.remove();
    requesterHistory.pop();
    _addMsg(container, 'Having trouble connecting. Try again.', 'ai');
  }
}

// ===== REQUESTER QUEUE VIEW =====
function renderRequesterQueue() {
  const container = document.getElementById('requesterQueueView');
  const tasks = Object.values(STATE.tasks);

  // Pipeline counts
  const counts = {
    'in-progress': tasks.filter(t => t.status === 'in-progress').length,
    'review': tasks.filter(t => t.status === 'review').length,  
    'blocked': tasks.filter(t => t.status === 'blocked').length,
    'triaged': tasks.filter(t => t.status === 'triaged').length,
    'queued': tasks.filter(t => t.status === 'queued').length,
    'complete': tasks.filter(t => t.status === 'complete').length
  };

  // Group tasks by status
  const groups = {
    'In Progress': tasks.filter(t => t.status === 'in-progress'),
    'In Review': tasks.filter(t => t.status === 'review'),
    'Blocked': tasks.filter(t => t.status === 'blocked'),
    'Waiting': tasks.filter(t => t.status === 'triaged' || t.status === 'queued'),
    'Completed': tasks.filter(t => t.status === 'complete')
  };

  const statusColor = (s) => {
    if (s === 'in-progress') return 'var(--green)';
    if (s === 'review') return 'var(--purple)';
    if (s === 'blocked') return 'var(--red)';
    if (s === 'triaged' || s === 'queued') return 'var(--gold)';
    if (s === 'complete') return 'var(--text-tertiary)';
    return 'var(--text-tertiary)';
  };

  const statusLabel = (s) => {
    if (s === 'in-progress') return 'In Progress';
    if (s === 'review') return 'In Review';
    if (s === 'blocked') return 'Blocked';
    if (s === 'triaged') return 'Triaged';
    if (s === 'queued') return 'Queued';
    if (s === 'complete') return 'Complete';
    return s;
  };

  const columns = [
    { key: 'Waiting', color: 'var(--gold)', tasks: groups['Waiting'] },
    { key: 'In Progress', color: 'var(--green)', tasks: groups['In Progress'] },
    { key: 'In Review', color: 'var(--purple)', tasks: groups['In Review'] },
    { key: 'Blocked', color: 'var(--red)', tasks: groups['Blocked'] },
    { key: 'Completed', color: 'var(--text-tertiary)', tasks: groups['Completed'] }
  ];

  let html = `<div class="kanban-board">`;

  for (const col of columns) {
    html += `
      <div class="kanban-column">
        <div class="kanban-column-header">
          <div class="col-dot" style="background:${col.color}"></div>
          ${col.key}
          <span class="queue-count">${col.tasks.length}</span>
        </div>
        <div class="kanban-column-cards">
          ${col.tasks.length === 0 ? `<div class="empty-state" style="padding:20px"><div class="empty-state-illustration" style="width:96px;height:96px;margin-bottom:8px"><img src="img/all-clear.jpg" alt=""></div><p style="margin:0;font-size:11px">All clear</p></div>` :
            col.tasks.map(task => {
              // Check for deliverable preview (only real URLs)
              const deliverable = task.status === 'complete' && task.attachments ? 
                task.attachments.find(a => a.isDeliverable) : null;
              let deliverablePreview = '';
              if (deliverable && deliverable.url && deliverable.url.startsWith('http')) {
                if (deliverable.url.includes('figma.com')) {
                  const embedUrl = `https://www.figma.com/embed?embed_host=atelier&url=${encodeURIComponent(deliverable.url)}`;
                  deliverablePreview = `<div class="deliverable-preview"><iframe src="${embedUrl}"></iframe></div>`;
                } else if (deliverable.name.match(/\.(jpg|jpeg|png|gif|webp)$/i) || deliverable.url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                  deliverablePreview = `<div class="deliverable-preview"><img src="${deliverable.url}" alt="${deliverable.name}"></div>`;
                } else {
                  deliverablePreview = `<div class="deliverable-preview"><div class="link-preview"><a href="${deliverable.url}" target="_blank" style="color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:6px"><i data-lucide="external-link" class="icon"></i>${deliverable.name}</a></div></div>`;
                }
              } else if (deliverable) {
                deliverablePreview = `<div class="deliverable-preview"><div class="link-preview" style="justify-content:center"><i data-lucide="file-check" class="icon" style="color:var(--green)"></i><span style="color:var(--text-secondary)">${deliverable.name}</span></div></div>`;
              }
              
              return `
                <div class="queue-card" onclick="openTaskModalReadOnly('${task.id}')">
                  ${deliverablePreview}
                  <div class="queue-card-title">${task.title}</div>
                  <div class="queue-card-meta">
                    <span class="queue-card-assignee">${task.assignee ? STATE.team[task.assignee]?.name || task.assignee : 'Unassigned'}</span>
                    <span>Due ${task.due}</span>
                  </div>
                  <div class="queue-card-meta" style="margin-top:2px">
                    <span>${task.requester}</span>
                  </div>
                  ${task.progress > 0 ? `
                    <div class="queue-card-progress">
                      <div class="queue-card-progress-bar" style="width:${task.progress}%"></div>
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
        </div>
      </div>
    `;
  }

  html += `</div>`;

  container.innerHTML = html;
  lucide.createIcons();
}

// ===== TASK MODAL =====
function openTaskModal(taskId) {
  openTaskModalInternal(taskId, false);
}

function openTaskModalReadOnly(taskId) {
  openTaskModalInternal(taskId, true);
}

function openTaskModalInternal(taskId, readOnly) {
  const task = STATE.tasks[taskId];
  if (!task) return;
  const overlay = document.getElementById('taskModal');
  const box = document.getElementById('taskModalContent');

  const statusColor = task.status === 'in-progress' ? 'var(--green)' :
    task.status === 'review' ? 'var(--purple)' :
    task.status === 'blocked' ? 'var(--red)' :
    task.status === 'triaged' ? 'var(--gold)' : 'var(--text-tertiary)';
  const statusLabel = task.status === 'in-progress' ? 'In Progress' :
    task.status === 'review' ? 'In Review' :
    task.status === 'blocked' ? 'Blocked' :
    task.status === 'triaged' ? 'Triaged' : 'Queued';
  const assigneeName = task.assignee ? STATE.team[task.assignee]?.name || task.assignee : 'Unassigned';

  // Generate activity based on task state
  const activities = [];
  if (task.status === 'blocked' && task.blocker) activities.push({ time: '2h ago', text: `${assigneeName} flagged as blocked` });
  const doneCount = (task.checklist || []).filter(c => c.done).length;
  if (doneCount > 0) activities.push({ time: 'Yesterday', text: `${assigneeName} completed ${doneCount} item${doneCount > 1 ? 's' : ''}` });
  if (task.status === 'review') activities.push({ time: 'Today', text: `${assigneeName} moved to review` });
  if (!activities.length) activities.push({ time: 'Recently', text: 'Task created and added to board' });

  const allStatuses = ['triaged', 'in-progress', 'review', 'complete'];

  box.innerHTML = `
    <button class="modal-close" onclick="closeTaskModal()">✕</button>
    <div class="modal-title">${task.title}</div>
    <div class="modal-status-line">
      <span class="ms-status" style="color:${statusColor}">${statusLabel}</span>
      <span class="ms-assignee">${assigneeName}</span>
    </div>
    <div class="modal-brief">${task.brief || ''}</div>
    <div class="modal-details">
      <div class="md-item"><div class="md-label">Due Date</div><div class="md-value">${task.due}</div></div>
      <div class="md-item"><div class="md-label">Requester</div><div class="md-value">${task.requester}</div></div>
      <div class="md-item"><div class="md-label">Priority</div><div class="md-value" style="text-transform:capitalize">${task.priority}</div></div>
      <div class="md-item">
        <div class="md-label">Progress</div>
        <div class="md-value">${task.progress}%</div>
        <div class="modal-progress-bar"><div class="bar-fill" style="width:${task.progress}%"></div></div>
      </div>
    </div>
    ${task.checklist && task.checklist.length ? `
      <div class="modal-section-label">Checklist (${doneCount}/${task.checklist.length})</div>
      <ul class="modal-checklist">
        ${task.checklist.map((item, i) => `
          <li class="${item.done ? 'done' : ''}" ${readOnly ? '' : `onclick="modalToggleCheck('${taskId}',${i})"`}>
            <div class="check-box" ${readOnly ? '' : `onclick="modalToggleCheck('${taskId}',${i})"`}></div>
            <div class="checklist-text">${item.text}</div>
            ${readOnly ? '' : `<button class="checklist-remove" onclick="event.stopPropagation();removeChecklistItem('${taskId}',${i})" title="Remove item">×</button>`}
          </li>
        `).join('')}
      </ul>
      ${readOnly ? '' : `
        <div class="add-checklist-item">
          <input type="text" id="newChecklistItem-${taskId}" placeholder="Add checklist item..." onkeydown="if(event.key==='Enter')addChecklistItem('${taskId}')">
          <button onclick="addChecklistItem('${taskId}')">Add</button>
        </div>
      `}
    ` : (!readOnly ? `
      <div class="modal-section-label">Checklist</div>
      <div class="add-checklist-item">
        <input type="text" id="newChecklistItem-${taskId}" placeholder="Add checklist item..." onkeydown="if(event.key==='Enter')addChecklistItem('${taskId}')">
        <button onclick="addChecklistItem('${taskId}')">Add</button>
      </div>
    ` : '')}
    <div class="modal-section-label">Attachments</div>
    <div class="attachments-section" id="modalAttachments-${taskId}">
      ${renderAttachmentList(task)}
      ${readOnly ? '' : `
        <button class="add-attachment-btn" onclick="showAttachmentOptions('${taskId}','modal')"><i data-lucide="plus" class="icon icon-sm"></i> Add attachment</button>
        <div id="attachmentOptions-${taskId}" style="display:none">
          <div class="add-attachment-options">
            <button onclick="triggerFileUpload('${taskId}','modal')"><i data-lucide="paperclip" class="icon icon-sm"></i> Upload file</button>
            <button onclick="showLinkForm('${taskId}','modal')"><i data-lucide="external-link" class="icon icon-sm"></i> Add link</button>
          </div>
          <input type="file" id="fileInput-${taskId}" style="display:none" onchange="handleFileUpload('${taskId}',this,'modal')">
          <div id="linkForm-${taskId}" style="display:none" class="add-link-form">
            <input type="text" id="linkName-${taskId}" placeholder="Name">
            <input type="text" id="linkUrl-${taskId}" placeholder="URL">
            <button onclick="addLinkAttachment('${taskId}','modal')">Add</button>
          </div>
        </div>
      `}
    </div>
    ${task.conversationHistory && task.conversationHistory.length ? `
      <div class="modal-section-label" style="cursor:pointer;display:flex;align-items:center;gap:6px" onclick="document.getElementById('modalConvo-${taskId}').classList.toggle('hidden')">
        <span>Request Conversation</span>
        <span style="font-size:10px;color:var(--text-tertiary)">▼</span>
      </div>
      <div id="modalConvo-${taskId}" class="hidden" style="margin-bottom:24px;background:var(--bg-warm);border-radius:12px;padding:16px;max-height:300px;overflow-y:auto">
        ${task.conversationHistory.map(msg => `
          <div style="margin-bottom:12px;font-size:13px;line-height:1.6">
            <span style="font-weight:600;color:${msg.role === 'user' ? 'var(--accent)' : 'var(--text-secondary)'};font-size:11px;text-transform:uppercase;letter-spacing:0.5px">${msg.role === 'user' ? task.requester || 'Requester' : 'Atelier'}</span>
            <div style="color:var(--text);margin-top:2px">${msg.content}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <div class="modal-section-label">Activity</div>
    <div class="modal-activity">
      ${activities.map(a => `<div class="act-item"><span class="act-time">${a.time}</span><span>${a.text}</span></div>`).join('')}
    </div>
    ${readOnly ? '' : `
      <div class="modal-actions">
        <select onchange="modalAssign('${taskId}',this.value)">
          <option value="" ${!task.assignee ? 'selected' : ''}>Unassigned</option>
          <option value="daniel" ${task.assignee === 'daniel' ? 'selected' : ''}>Daniel</option>
          <option value="benjamin" ${task.assignee === 'benjamin' ? 'selected' : ''}>Benjamin</option>
        </select>
        ${task.assignee ? `<div class="role-toggle">
          <button class="${task.type === 'primary' ? 'active-role' : ''}" onclick="modalSetRole('${taskId}','primary')">Primary</button>
          <button class="${task.type === 'interruption' ? 'active-role' : ''}" onclick="modalSetRole('${taskId}','secondary')">Secondary</button>
        </div>` : ''}
        ${allStatuses.map(s => {
          const label = s === 'in-progress' ? 'In Progress' : s === 'review' ? 'Review' : s === 'triaged' ? 'Triage' : 'Complete';
          const isActive = task.status === s;
          return `<button class="status-btn ${isActive ? 'active-status' : ''}" onclick="modalSetStatus('${taskId}','${s}')">${label}</button>`;
        }).join('')}
        ${currentView === 'manager' ? `<button class="status-btn" style="margin-left:auto;color:var(--red)" onclick="modalDeleteTask('${taskId}')">Delete</button>` : ''}
      </div>
    `}
  `;

  overlay.classList.add('visible');
  requestAnimationFrame(() => { requestAnimationFrame(() => overlay.classList.add('show')); });
  lucide.createIcons();
}

function closeTaskModal() {
  const overlay = document.getElementById('taskModal');
  overlay.classList.remove('show');
  setTimeout(() => overlay.classList.remove('visible'), 200);
}

function modalToggleCheck(taskId, index) {
  const task = STATE.tasks[taskId];
  const wasChecked = task.checklist[index].done;
  task.checklist[index].done = !task.checklist[index].done;
  
  // Show toast only when checking ON
  if (!wasChecked && task.checklist[index].done) {
    showToast('Checked off: ' + task.checklist[index].text, 'var(--green)');
  }
  
  const done = task.checklist.filter(c => c.done).length;
  task.progress = Math.round(done / task.checklist.length * 100);
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function addChecklistItem(taskId) {
  const input = document.getElementById('newChecklistItem-' + taskId);
  const text = input.value.trim();
  if (!text) return;
  
  const task = STATE.tasks[taskId];
  if (!task.checklist) task.checklist = [];
  task.checklist.push({ text, done: false });
  
  // Recalculate progress
  const done = task.checklist.filter(c => c.done).length;
  task.progress = task.checklist.length > 0 ? Math.round(done / task.checklist.length * 100) : 0;
  
  input.value = '';
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function removeChecklistItem(taskId, index) {
  const task = STATE.tasks[taskId];
  task.checklist.splice(index, 1);
  
  // Recalculate progress
  const done = task.checklist.filter(c => c.done).length;
  task.progress = task.checklist.length > 0 ? Math.round(done / task.checklist.length * 100) : 0;
  
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function modalAssign(taskId, value) {
  const task = STATE.tasks[taskId];
  task.assignee = value || null;
  if (!value) { task.type = 'queue'; task.status = 'queued'; }
  else if (task.type === 'queue') { task.type = 'interruption'; task.slot = 1; if (task.status === 'queued') task.status = 'triaged'; }
  
  if (value) {
    const name = STATE.team[value]?.name || value;
    showToast(name + ' assigned to ' + task.title);
  }
  
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function modalSetRole(taskId, role) {
  const task = STATE.tasks[taskId];
  if (!task.assignee) return;
  
  if (role === 'primary') {
    // Check if this designer already has a primary
    const existingPrimary = Object.values(STATE.tasks).find(
      t => t.id !== taskId && t.assignee === task.assignee && t.type === 'primary' && t.status !== 'complete'
    );
    if (existingPrimary) {
      // Bump existing primary to secondary
      const ints = Object.values(STATE.tasks).filter(
        t => t.assignee === task.assignee && t.type === 'interruption' && t.status !== 'complete'
      );
      if (ints.length >= 2) {
        // Secondary slots full — bump to queue
        existingPrimary.type = 'queue';
        existingPrimary.assignee = null;
        existingPrimary.status = 'queued';
        showToast(existingPrimary.title + ' moved back to queue (slots full)', 'var(--gold)');
      } else {
        existingPrimary.type = 'interruption';
        existingPrimary.slot = ints.length + 1;
        showToast(existingPrimary.title + ' moved to secondary', 'var(--gold)');
      }
    }
    task.type = 'primary';
    delete task.slot;
    if (task.status === 'queued' || task.status === 'triaged') task.status = 'in-progress';
    showToast(task.title + ' is now primary for ' + (STATE.team[task.assignee]?.name || task.assignee));
  } else {
    // Setting to secondary
    const ints = Object.values(STATE.tasks).filter(
      t => t.id !== taskId && t.assignee === task.assignee && t.type === 'interruption' && t.status !== 'complete'
    );
    if (ints.length >= 2) {
      showToast('Secondary slots are full for ' + (STATE.team[task.assignee]?.name || task.assignee), 'var(--red)');
      return;
    }
    task.type = 'interruption';
    task.slot = ints.length + 1;
    showToast(task.title + ' moved to secondary');
  }
  
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function modalSetStatus(taskId, status) {
  const task = STATE.tasks[taskId];
  const statusLabel = status === 'in-progress' ? 'In Progress' : 
    status === 'review' ? 'Review' : 
    status === 'triaged' ? 'Triaged' : 
    status === 'complete' ? 'Complete' : status;
  
  if (status === 'complete') {
    task.status = 'complete'; task.progress = 100;
    if (task.checklist) task.checklist.forEach(c => c.done = true);
  } else {
    task.status = status;
  }
  
  showToast('Task moved to ' + statusLabel);
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue(); openTaskModal(taskId);
}

function modalDeleteTask(taskId) {
  const task = STATE.tasks[taskId];
  if (!task) return;
  if (!confirm('Delete "' + task.title + '" permanently? This can\'t be undone.')) return;
  delete STATE.tasks[taskId];
  closeTaskModal();
  showToast('Deleted: ' + task.title, 'var(--red)');
  saveState(); renderBoard(); renderDesigner(); renderRequesterQueue();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTaskModal(); });

// ===== ATTACHMENTS =====
function renderAttachmentList(task) {
  const atts = task.attachments || [];
  if (!atts.length) return '<div style="font-size:13px;color:var(--text-tertiary);margin-bottom:8px">No attachments yet</div>';
  return atts.map((a, i) => `
    <div class="attachment-row">
      <span class="att-icon"><i data-lucide="${a.type === 'file' ? 'paperclip' : 'external-link'}" class="icon icon-sm"></i></span>
      <span class="att-name"><a href="${a.url}" target="_blank">${a.name}</a></span>
      <span class="att-meta">${a.addedBy}</span>
      <button class="att-remove" onclick="event.stopPropagation();removeAttachment('${task.id}',${i})" title="Remove">✕</button>
    </div>
  `).join('');
}

function showAttachmentOptions(taskId, context) {
  const el = document.getElementById('attachmentOptions-' + taskId);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function triggerFileUpload(taskId, context) {
  document.getElementById('fileInput-' + taskId).click();
}

function showLinkForm(taskId, context) {
  const el = document.getElementById('linkForm-' + taskId);
  if (el) { el.style.display = 'flex'; el.querySelector('input').focus(); }
}

async function handleFileUpload(taskId, input, context) {
  const file = input.files[0];
  if (!file) return;
  const task = STATE.tasks[taskId];
  if (!task.attachments) task.attachments = [];
  
  // Upload to Supabase storage
  const addedBy = context === 'designer' ? STATE.team[STATE.currentDesigner].name : 'You';
  const placeholder = { type: 'file', name: file.name, url: '#', addedBy, addedAt: new Date().toISOString().split('T')[0], uploading: true };
  task.attachments.push(placeholder);
  saveState();
  if (context === 'modal') openTaskModal(taskId);
  
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': file.type, 'x-filename': file.name },
      body: file
    });
    const data = await res.json();
    if (data.url) {
      placeholder.url = data.url;
      placeholder.uploading = false;
      saveState();
      if (context === 'modal') openTaskModal(taskId);
      if (context === 'designer') renderDesigner();
      showToast('Uploaded: ' + file.name, 'var(--green)');
    }
  } catch(e) {
    showToast('Upload failed: ' + file.name, 'var(--red)');
  }
  input.value = '';
}

function addLinkAttachment(taskId, context) {
  const nameEl = document.getElementById('linkName-' + taskId);
  const urlEl = document.getElementById('linkUrl-' + taskId);
  if (!nameEl.value.trim() || !urlEl.value.trim()) return;
  const task = STATE.tasks[taskId];
  if (!task.attachments) task.attachments = [];
  task.attachments.push({
    type: 'link', name: nameEl.value.trim(), url: urlEl.value.trim(),
    addedBy: context === 'designer' ? STATE.team[STATE.currentDesigner].name : 'You',
    addedAt: new Date().toISOString().split('T')[0]
  });
  saveState();
  if (context === 'modal') openTaskModal(taskId);
  if (context === 'designer') renderDesigner();
  nameEl.value = '';
  urlEl.value = '';
}

function removeAttachment(taskId, index) {
  const task = STATE.tasks[taskId];
  if (task.attachments) { 
    task.attachments.splice(index, 1); 
    saveState(); 
    openTaskModal(taskId); 
    renderDesigner(); 
  }
}

    </div>

function closeTemplateLibrary() {
  const modal = document.getElementById('templateModal');
  modal.classList.remove('show');
}

function openDesignSystemModal() {
  const modal = document.getElementById('designSystemModal');
  const iframe = document.getElementById('designSystemFrame');
  iframe.src = 'https://parthenon-design-system.vercel.app/';
  modal.classList.add('show');
}

function closeDesignSystemModal() {
  const modal = document.getElementById('designSystemModal');
  const iframe = document.getElementById('designSystemFrame');
  modal.classList.remove('show');
  iframe.src = '';
}

function useTemplate(templateType) {
  closeTemplateLibrary();
  openRequestDrawer();
  
  // Pre-fill template message
  const templates = {
    'social-media': 'I need a social media kit for [product/campaign]. Platforms: Instagram, Twitter, LinkedIn. Please include post templates, story templates, and profile banners.',
    'landing-page': 'I need a landing page design for [product/campaign]. The page should be conversion-focused with clear CTAs and modern design that matches our brand.',
    'email-header': 'I need an email header template for our weekly newsletter. Should be responsive and include space for dynamic headlines and featured content.',
    'presentation': 'I need a presentation design for [event/meeting]. Approximately [X] slides covering [topic]. Should follow our brand guidelines and be visually engaging.',
    'brand-assets': 'I need brand assets including [logos/guidelines/icons]. These will be used for [purpose/campaign] and should maintain consistency with our current brand identity.'
  };
  
  const message = templates[templateType] || '';
  
  // Wait for drawer to open, then populate
  setTimeout(() => {
    const input = document.getElementById('requesterInput');
    if (input) {
      input.value = message;
      input.focus();
      // Move cursor to end and select placeholder text
      const placeholderMatch = message.match(/\[([^\]]+)\]/);
      if (placeholderMatch) {
        const start = message.indexOf(placeholderMatch[0]);
        const end = start + placeholderMatch[0].length;
        input.setSelectionRange(start, end);
      }
    }
  }, 300);
}
