<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Atelier — Design Team Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg: #F9F8F2;
  --bg-warm: #f7f3ed;
  --bg-hover: #f3efe8;
  --bg-card: #ffffff;
  --text: #2d2b28;
  --text-secondary: #8b8680;
  --text-tertiary: #b0a99f;
  --border: #ebe6de;
  --border-input: #ddd8d0;
  --divider: #f0ebe4;
  --accent: #c4704b;
  --green: #6b8f71;
  --red: #c46b5e;
  --purple: #8b7aab;
  --gold: #b89650;
  --radius: 12px;
  --radius-lg: 16px;
  --transition: all 0.2s ease;
}

[data-theme="dark"] {
  --bg: #1a1918;
  --bg-warm: #222120;
  --bg-hover: #2a2928;
  --bg-card: #262524;
  --text: #e8e4df;
  --text-secondary: #9b9590;
  --text-tertiary: #6b6560;
  --border: #3a3835;
  --border-input: #4a4845;
  --divider: #333130;
  --accent: #d4815c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); overflow: hidden;
  height: 100vh; font-size: 14px; line-height: 1.65;
  font-weight: 400; letter-spacing: -0.01em;
}
h1, h2, h3, .heading { font-family: 'Playfair Display', serif; font-weight: 500; color: var(--text); }

/* ===== NAV BAR ===== */
#viewSelector {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 52px;
}
#viewSelector .logo {
  font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500;
  color: #9c8b7a; letter-spacing: 0.3px;
}
#viewSelector .logo span { color: var(--accent); }
.view-tabs { display: flex; gap: 24px; }
.view-tab {
  padding: 0; border: none; border-radius: 0;
  background: none; color: var(--text-tertiary); font-size: 13px;
  font-weight: 400; cursor: pointer; transition: color 0.2s ease;
  font-family: 'Inter', sans-serif;
}
.view-tab:hover { color: var(--text-secondary); }
.view-tab.active { color: var(--text); font-weight: 500; }

/* ===== VIEWS CONTAINER ===== */
.view { display: none; height: 100vh; padding-top: 52px; }
.view.active { display: flex; }

/* ===== MANAGER VIEW ===== */
#managerView { display: none; flex-direction: row; }
#managerView.active { display: flex; }

/* Chat Panel — white card */
.chat-panel {
  width: 480px; min-width: 400px; height: calc(100% - 48px); display: flex; flex-direction: column;
  background: var(--bg-card); margin: 24px 16px 24px 24px; border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.chat-header {
  padding: 24px 28px 16px; border-bottom: 1px solid var(--divider);
}
.chat-header h2 { font-size: 17px; color: var(--text); margin-bottom: 3px; font-weight: 500; }
.chat-header p { font-size: 13px; color: var(--text-secondary); font-weight: 400; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px 28px; display: flex;
  flex-direction: column; gap: 20px;
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
}

.msg {
  max-width: 85%; padding: 16px; border-radius: var(--radius-lg);
  font-size: 14px; line-height: 1.65; animation: msgIn 0.2s ease-out;
  white-space: pre-wrap;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.ai {
  align-self: flex-start; background: var(--bg-card);
  border: 1px solid var(--border); color: var(--text);
}
.msg.ai .sender { display: none; }
.msg.user {
  align-self: flex-end; background: #edf2fa;
  color: var(--text);
}
.msg a { color: var(--accent); }
.msg strong { color: var(--text); font-weight: 600; }
.msg .task-ref { color: var(--accent); cursor: pointer; text-decoration: underline; text-decoration-style: dotted; }
.msg .task-ref:hover { text-decoration-style: solid; }

/* Typing indicator */
.typing-indicator { display: flex; gap: 5px; padding: 16px; align-self: flex-start; }
.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%; background: #c4b5a6;
  animation: typingFade 1.4s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingFade {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.chat-input-area {
  padding: 18px 28px; border-top: 1px solid var(--divider);
  display: flex; gap: 12px; align-items: center;
}
.chat-input {
  flex: 1; height: 48px; padding: 0 20px; border-radius: 16px;
  background: var(--bg-card); border: 1px solid var(--border-input);
  color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
  outline: none; transition: var(--transition);
}
.chat-input:focus { border-color: #b0a99f; box-shadow: 0 0 0 3px rgba(196,112,75,0.06); }
.chat-input::placeholder { color: var(--text-tertiary); }
.chat-send {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--text); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: var(--transition); flex-shrink: 0;
}
.chat-send:hover { opacity: 0.85; }

/* Board Panel — floats on beige, NOT a card */
.board-panel {
  flex: 1; height: calc(100% - 48px); overflow-y: auto; padding: 24px 28px 24px 16px;
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
  background: transparent;
}
.board-section { margin-bottom: 32px; }
.board-section-title {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-tertiary); margin-bottom: 12px;
}
.board-section-title::after { display: none; }

/* Task Cards */
.task-card {
  background: var(--bg-card); border-radius: var(--radius);
  padding: 16px 20px; margin-bottom: 10px;
  border: 1px solid var(--border);
  transition: var(--transition); cursor: pointer; position: relative;
}
.task-card:hover { transform: translateY(-1px); }
.task-card.priority-high,
.task-card.priority-medium,
.task-card.priority-low,
.task-card.blocked { border-left: none; }
.task-card.blocked .blocked-icon {
  position: absolute; top: 12px; right: 12px;
}
.icon { width: 16px; height: 16px; stroke-width: 1.5; display: inline-block; vertical-align: middle; }
.icon-sm { width: 14px; height: 14px; }

.task-card.glow {
  box-shadow: 0 0 0 2px rgba(196,112,75,0.25);
  border-color: var(--accent) !important;
}
@keyframes cardPulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(196,112,75,0.15); }
  50% { box-shadow: 0 0 0 3px rgba(196,112,75,0.3); }
}
.task-card.glow { animation: cardPulse 2s ease-in-out infinite; }

.task-card .card-title {
  font-weight: 500; font-size: 14px; color: var(--text); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.task-card .card-title::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.task-card.priority-high .card-title::before { background: var(--red); }
.task-card.priority-medium .card-title::before { background: var(--gold); }
.task-card.priority-low .card-title::before { background: var(--green); }
.task-card.blocked .card-title::before { background: var(--red); }

.task-card .card-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; padding-left: 14px; }
.task-card .card-meta span { display: flex; align-items: center; gap: 4px; }
.task-card .card-assignee { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-bottom: 4px; padding-left: 14px; }
.task-card .card-progress {
  margin-top: 8px; height: 2px; border-radius: 1px; background: var(--border); margin-left: 14px;
}
.task-card .card-progress-bar {
  height: 100%; border-radius: 1px; background: var(--accent);
  transition: width 0.6s ease;
}

/* Status — text only, no pill */
.task-card .card-status {
  display: inline; padding: 0; border-radius: 0; background: none;
  font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
}
.status-in-progress { background: none; color: var(--green); }
.status-review { background: none; color: var(--purple); }
.status-blocked { background: none; color: var(--red); }
.status-triaged { background: none; color: var(--gold); }
.status-queued { background: none; color: var(--text-tertiary); }

/* Interruption slots */
.slot-row { display: flex; gap: 10px; }
.slot-card {
  flex: 1; background: transparent; border: 1px dashed var(--border-input);
  border-radius: var(--radius); padding: 16px; min-height: 80px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary); font-size: 13px; font-weight: 400;
  transition: var(--transition);
}
.slot-card.filled {
  border-style: solid; background: var(--bg-card); border-color: var(--border);
  display: block;
}
.slot-card .slot-label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

/* ===== DESIGNER VIEW ===== */
#designerView { flex-direction: column; position: relative; }
#designerView.active { display: flex; }

.designer-picker {
  display: flex; gap: 24px; padding: 14px 28px;
  background: var(--bg);
}
.designer-btn {
  padding: 0; border-radius: 0; border: none;
  background: none; color: var(--text-tertiary); font-size: 13px; font-weight: 400;
  cursor: pointer; transition: color 0.2s ease; font-family: 'Inter', sans-serif;
}
.designer-btn:hover { color: var(--text-secondary); }
.designer-btn.active { color: var(--text); font-weight: 500; }

.designer-content {
  flex: 1; overflow-y: auto; padding: 40px 48px; background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
}

.primary-zone {
  background: var(--bg-card); border-radius: var(--radius-lg); padding: 40px;
  border: 1px solid var(--border); margin-bottom: 32px;
  max-width: 640px; width: 100%; cursor: pointer;
}
.primary-zone .zone-label {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-tertiary); margin-bottom: 16px;
}
.primary-zone .task-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--text); margin-bottom: 12px; font-weight: 500; }
.primary-zone .task-brief { color: var(--text-secondary); font-size: 15px; line-height: 1.7; margin-bottom: 28px; }
.primary-zone .task-details { display: flex; gap: 32px; margin-bottom: 28px; flex-wrap: wrap; }
.detail-item { display: flex; flex-direction: column; gap: 2px; }
.detail-item .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); }
.detail-item .value { font-size: 14px; font-weight: 500; color: var(--text); }

.checklist { list-style: none; margin-bottom: 20px; }
.checklist li {
  padding: 8px 0; border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; gap: 10px; font-size: 14px;
  cursor: pointer; transition: var(--transition); color: var(--text);
}
.checklist li:hover { background: var(--bg-hover); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: var(--radius); }
.checklist li.done { color: var(--text-tertiary); text-decoration: line-through; }
.check-box {
  width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid #d4cfc7;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: var(--transition);
}
.checklist li.done .check-box { background: var(--accent); border-color: var(--accent); }
.checklist li.done .check-box::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

.action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
.action-btn {
  padding: 8px 20px; border-radius: 10px; border: 1px solid #d4cfc7; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: var(--transition);
  font-family: 'Inter', sans-serif; background: var(--bg-card);
}
.action-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.action-btn.primary:hover { opacity: 0.85; }
.action-btn.danger { color: var(--red); border-color: #d4cfc7; background: var(--bg-card); }
.action-btn.danger:hover { background: var(--bg-warm); }
.action-btn.secondary { color: var(--text-secondary); }
.action-btn.secondary:hover { background: var(--bg-warm); }

.interruption-zone { margin-bottom: 24px; max-width: 640px; width: 100%; }
.interruption-zone .zone-label {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-tertiary); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.interruption-counter {
  background: none; color: var(--gold); padding: 0;
  font-size: 11px; font-weight: 500;
}
.interruption-full {
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px; color: var(--red);
  font-size: 13px; margin-top: 10px;
}

/* Intercom-style chat widget */
.chat-bubble {
  position: fixed; bottom: 24px; right: 24px; z-index: 95;
  width: 56px; height: 56px; border-radius: 50%; background: var(--accent);
  color: white; border: none; cursor: pointer; display: flex;
  align-items: center; justify-content: center; font-size: 20px;
  box-shadow: 0 4px 12px rgba(196,112,75,0.25);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.chat-bubble:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(196,112,75,0.3);
}
.chat-widget {
  position: fixed; bottom: 90px; right: 24px; z-index: 90;
  width: 380px; height: 500px; background: var(--bg-card);
  border-radius: var(--radius-lg); border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  transform: translateY(20px) scale(0.95);
  opacity: 0; visibility: hidden;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column;
}
.chat-widget.open {
  transform: translateY(0) scale(1);
  opacity: 1; visibility: visible;
}
.widget-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: space-between;
}
.widget-header h3 { font-size: 16px; font-weight: 500; color: var(--text); }
.widget-close {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 18px; padding: 4px;
}
.widget-close:hover { color: var(--text-secondary); }
.widget-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px; display: flex;
  flex-direction: column; gap: 16px;
}
.widget-input-area {
  padding: 16px 20px; border-top: 1px solid var(--divider);
  display: flex; gap: 8px; align-items: center;
}

/* Original request chat history (designer view) */
.view-request-toggle {
  color: var(--text-tertiary); font-size: 12px; cursor: pointer;
  text-decoration: none; margin-bottom: 16px; display: inline-block;
}
.view-request-toggle:hover { color: var(--accent); }
.request-history {
  display: none; margin-bottom: 20px; padding: 16px; background: var(--bg-warm);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.request-history.expanded { display: block; }
.request-history .history-title {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 12px;
}
.history-msg {
  margin-bottom: 12px; font-size: 13px; line-height: 1.6;
}
.history-msg .msg-author {
  font-weight: 500; color: var(--text); margin-bottom: 4px;
}
.history-msg .msg-content { color: var(--text-secondary); }

/* ===== REQUESTER VIEW ===== */
#requesterView { flex-direction: column; background: var(--bg); overflow: hidden; position: relative; }
#requesterView.active { display: flex; }

/* Queue-first layout */
.requester-header-bar {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-card); flex-shrink: 0;
}
.requester-header-bar h2 {
  font-family: 'Playfair Display', serif; font-size: 20px;
  font-weight: 500; color: var(--text);
}
.new-request-btn {
  padding: 10px 24px; border-radius: 12px; border: none;
  background: var(--accent); color: white; font-size: 14px;
  font-weight: 500; cursor: pointer; transition: var(--transition);
}
.new-request-btn:hover { opacity: 0.9; }

.requester-queue-view {
  flex: 1; overflow: hidden; padding: 20px 24px;
  width: 100%;
  display: flex; flex-direction: column;
}
.kanban-board {
  display: flex; gap: 16px; flex: 1; overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
}
.kanban-column {
  min-width: 240px; flex: 1; display: flex; flex-direction: column;
  max-width: 300px;
}
.kanban-column-header {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-tertiary); margin-bottom: 12px;
  padding: 0 4px; display: flex; align-items: center; gap: 8px;
}
.kanban-column-header .col-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.kanban-column-cards {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
}

/* New Request drawer */
.request-drawer {
  position: fixed; top: 52px; right: 0; bottom: 0; width: 420px;
  background: var(--bg-card); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform 0.3s ease;
  display: flex; flex-direction: column; z-index: 80;
}
.request-drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 20px 24px 16px; border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; justify-content: between;
}
.drawer-header h3 {
  font-family: 'Playfair Display', serif; font-size: 18px;
  font-weight: 500; color: var(--text); flex: 1;
}
.drawer-close {
  background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 20px; padding: 4px;
}
.drawer-close:hover { color: var(--text-secondary); }
.drawer-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px; display: flex;
  flex-direction: column; gap: 16px;
}
.drawer-input-area {
  padding: 16px 20px; border-top: 1px solid var(--divider);
  display: flex; gap: 8px; align-items: center;
}

/* Queue groups */
.queue-group {
  margin-bottom: 28px;
}
.queue-group-title {
  font-size: 12px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text-tertiary); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.queue-count {
  background: var(--bg-warm); color: var(--text-secondary);
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
}

.queue-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 10px;
  cursor: pointer; transition: var(--transition);
}
.queue-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.queue-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.queue-card-title { font-weight: 500; font-size: 14px; color: var(--text); }
.queue-card-status {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px;
}
.queue-card-meta {
  font-size: 12px; color: var(--text-secondary); margin-bottom: 6px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.queue-card-assignee { font-weight: 500; }
.queue-card-progress {
  height: 2px; border-radius: 1px; background: var(--border); margin-top: 8px;
}
.queue-card-progress-bar {
  height: 100%; border-radius: 1px; background: var(--accent);
  transition: width 0.6s ease;
}

/* Pipeline overview */
.pipeline-overview {
  display: flex; align-items: center; justify-content: center; gap: 0;
  padding: 20px 0 28px; flex-wrap: wrap;
}
.pipeline-stage {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-width: 80px;
}
.pipeline-stage .stage-icon { color: var(--text-tertiary); }
.pipeline-stage .stage-count {
  font-size: 20px; font-weight: 600; color: var(--text); line-height: 1;
}
.pipeline-stage .stage-label {
  font-size: 11px; color: var(--text-secondary); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 500;
}
.pipeline-connector {
  width: 32px; height: 1px; background: var(--border); margin-bottom: 14px;
}

/* Summary card in chat */
.summary-card {
  background: var(--bg-warm); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-top: 8px;
}
.summary-card .sc-title { font-weight: 600; color: var(--text); margin-bottom: 8px; }
.summary-card .sc-row { display: flex; gap: 8px; font-size: 13px; margin-bottom: 4px; color: var(--text-secondary); }
.summary-card .sc-row span:first-child { width: 20px; text-align: center; }

/* Quick actions as pills (change #7) */
.quick-actions {
  display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 24px;
  align-items: center;
}
.quick-action {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px;
  cursor: pointer; transition: var(--transition);
  font-family: 'Inter', sans-serif; font-weight: 400;
}
.quick-action:hover {
  background: var(--bg-warm); color: var(--text);
}
.quick-action + .quick-action::before { display: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

/* ===== TASK MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.3); align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s ease;
}
.modal-overlay.visible { display: flex; }
.modal-overlay.show { opacity: 1; }
.modal-box {
  background: #ffffff; border-radius: 16px; max-width: 560px; width: 92%;
  padding: 36px; position: relative; max-height: 85vh; overflow-y: auto;
  transform: scale(0.95); transition: transform 0.2s ease;
  scrollbar-width: thin; scrollbar-color: #ddd transparent;
}
.modal-overlay.show .modal-box { transform: scale(1); }
.modal-close {
  position: absolute; top: 16px; right: 20px; background: none; border: none;
  color: var(--text-tertiary); font-size: 22px; cursor: pointer; line-height: 1;
  padding: 4px; font-family: 'Inter', sans-serif;
}
.modal-close:hover { color: var(--text-secondary); }
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.modal-status-line { font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.modal-status-line .ms-status { font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.modal-status-line .ms-assignee { color: var(--text-secondary); }
.modal-brief { color: var(--text-secondary); font-size: 14px; line-height: 1.7; margin-bottom: 24px; }
.modal-details { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; margin-bottom: 24px; }
.modal-details .md-item .md-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 2px; }
.modal-details .md-item .md-value { font-size: 14px; font-weight: 500; color: var(--text); }
.modal-progress-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 4px; }
.modal-progress-bar .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s ease; }
.modal-section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 8px; }
.modal-checklist { list-style: none; margin-bottom: 12px; }
.modal-checklist li {
  padding: 7px 0; border-bottom: 1px solid var(--divider);
  display: flex; align-items: center; gap: 10px; font-size: 14px;
  transition: var(--transition); color: var(--text); position: relative;
}
.modal-checklist li:hover { color: var(--accent); }
.modal-checklist li.done { color: var(--text-tertiary); text-decoration: line-through; }
.modal-checklist li .check-box {
  width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid #d4cfc7;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: var(--transition); cursor: pointer;
}
.modal-checklist li.done .check-box { background: var(--accent); border-color: var(--accent); }
.modal-checklist li.done .check-box::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }
.modal-checklist li .checklist-text { flex: 1; cursor: pointer; }
.modal-checklist li .checklist-remove {
  opacity: 0; background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 16px; padding: 2px 4px; transition: opacity 0.15s;
  position: absolute; right: 0; top: 50%; transform: translateY(-50%);
}
.modal-checklist li:hover .checklist-remove { opacity: 1; }
.modal-checklist li .checklist-remove:hover { color: var(--red); }

/* Add checklist item input (change #8) */
.add-checklist-item {
  display: flex; gap: 8px; margin-bottom: 16px; align-items: center;
}
.add-checklist-item input {
  flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-input);
  font-size: 14px; font-family: 'Inter', sans-serif; background: var(--bg-card);
  color: var(--text); outline: none;
}
.add-checklist-item input:focus { border-color: #b0a99f; }
.add-checklist-item button {
  padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-input);
  background: var(--text); color: #fff; font-size: 12px; cursor: pointer;
  font-family: 'Inter', sans-serif;
}

.modal-activity { margin-bottom: 24px; }
.modal-activity .act-item { font-size: 13px; color: var(--text-secondary); padding: 4px 0; display: flex; gap: 8px; }
.modal-activity .act-time { color: var(--text-tertiary); white-space: nowrap; min-width: 70px; }
.modal-actions {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding-top: 20px; border-top: 1px solid var(--divider);
}
.modal-actions select {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-input);
  font-size: 13px; font-family: 'Inter', sans-serif; background: var(--bg-card);
  color: var(--text); cursor: pointer; outline: none;
}
.modal-actions .status-btn {
  padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-input);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: var(--transition);
  font-family: 'Inter', sans-serif; background: var(--bg-card); color: var(--text-secondary);
}
.modal-actions .status-btn:hover { background: var(--bg-warm); }
.modal-actions .status-btn.active-status { background: var(--text); color: #fff; border-color: var(--text); }

/* ===== ATTACHMENTS ===== */
.attachments-section { margin-bottom: 24px; }
.attachment-row {
  display: flex; align-items: center; gap: 10px; padding: 7px 8px;
  border-radius: 8px; transition: background 0.15s ease; cursor: default;
  font-size: 14px; color: var(--text);
}
.attachment-row:hover { background: var(--bg-hover); }
.attachment-row .att-icon { color: var(--text-tertiary); flex-shrink: 0; display: flex; }
.attachment-row .att-name { flex: 1; }
.attachment-row .att-name a { color: var(--text); text-decoration: none; }
.attachment-row .att-name a:hover { color: var(--accent); }
.attachment-row .att-meta { font-size: 12px; color: var(--text-tertiary); }
.attachment-row .att-remove {
  opacity: 0; background: none; border: none; color: var(--text-tertiary);
  cursor: pointer; font-size: 14px; padding: 2px 4px; transition: opacity 0.15s;
}
.attachment-row:hover .att-remove { opacity: 1; }
.attachment-row .att-remove:hover { color: var(--red); }

.manage-attachments-link {
  color: var(--text-tertiary); font-size: 12px; cursor: pointer;
  text-decoration: none; margin-top: 8px; display: inline-block;
}
.manage-attachments-link:hover { color: var(--accent); }
.add-attachment-btn {
  display: inline-flex; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text-tertiary);
  font-size: 12px; cursor: pointer; padding: 4px 0;
  font-family: 'Inter', sans-serif; transition: color 0.2s;
}
.add-attachment-btn:hover { color: var(--accent); }
.add-attachment-options {
  display: flex; gap: 8px; margin-top: 8px;
}
.add-attachment-options button {
  padding: 6px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary); font-size: 12px;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: var(--transition);
  display: inline-flex; align-items: center; gap: 5px;
}
.add-attachment-options button:hover { background: var(--bg-warm); color: var(--text); }
.add-link-form {
  display: flex; gap: 8px; margin-top: 8px; align-items: center;
}
.add-link-form input {
  flex: 1; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border-input);
  font-size: 13px; font-family: 'Inter', sans-serif; background: var(--bg-card);
  color: var(--text); outline: none;
}
.add-link-form input:focus { border-color: #b0a99f; }
.add-link-form button {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--text); color: #fff; font-size: 12px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: var(--transition);
}
.add-link-form button:hover { opacity: 0.85; }

/* ===== DELIGHT ANIMATIONS ===== */

/* Card entrance — stagger in from below */
@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-card, .queue-card, .slot-card.filled, .track-card {
  animation: cardSlideIn 0.35s ease-out backwards;
}
.task-card:nth-child(1), .queue-card:nth-child(1) { animation-delay: 0.05s; }
.task-card:nth-child(2), .queue-card:nth-child(2) { animation-delay: 0.1s; }
.task-card:nth-child(3), .queue-card:nth-child(3) { animation-delay: 0.15s; }
.task-card:nth-child(4), .queue-card:nth-child(4) { animation-delay: 0.2s; }
.task-card:nth-child(5), .queue-card:nth-child(5) { animation-delay: 0.25s; }

/* Checklist check — satisfying pop */
@keyframes checkPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); }
  100% { transform: scale(1); }
}
.checklist li.done .check-box,
.modal-checklist li.done .check-box {
  animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Checklist strikethrough — slide in */
.checklist li.done, .modal-checklist li.done {
  transition: color 0.3s ease, opacity 0.3s ease;
}

/* Chat send button — micro press */
@keyframes sendPulse {
  0% { transform: scale(1); }
  50% { transform: scale(0.88); }
  100% { transform: scale(1); }
}
.chat-send:active { animation: sendPulse 0.15s ease-out; }

/* Progress bars — animate width on load */
@keyframes progressGrow {
  from { width: 0; }
}
.card-progress-bar, .tc-progress-bar, .queue-card-progress-bar, .bar-fill {
  animation: progressGrow 0.8s cubic-bezier(0.22, 1, 0.36, 1) backwards;
  animation-delay: 0.3s;
}

/* Chat widget bubble — gentle breathe */
@keyframes bubbleBreathe {
  0%, 100% { box-shadow: 0 4px 12px rgba(196,112,75,0.25); }
  50% { box-shadow: 0 4px 20px rgba(196,112,75,0.4); }
}
.chat-bubble { animation: bubbleBreathe 3s ease-in-out infinite; }
.chat-bubble:hover { animation: none; transform: scale(1.08); }

/* View transition — fade in */
@keyframes viewFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.view.active { animation: viewFadeIn 0.25s ease-out; }

/* Modal — smooth entrance */
@keyframes modalSlideUp {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-overlay.show .modal-box {
  animation: modalSlideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Kanban column — stagger entrance */
@keyframes colFadeIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
.kanban-column {
  animation: colFadeIn 0.3s ease-out backwards;
}
.kanban-column:nth-child(1) { animation-delay: 0s; }
.kanban-column:nth-child(2) { animation-delay: 0.06s; }
.kanban-column:nth-child(3) { animation-delay: 0.12s; }
.kanban-column:nth-child(4) { animation-delay: 0.18s; }
.kanban-column:nth-child(5) { animation-delay: 0.24s; }

/* Request drawer — slide + fade */
.request-drawer {
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
}
.request-drawer.open {
  box-shadow: -8px 0 30px rgba(0,0,0,0.08);
}

/* Quick action pills — gentle hover lift */
.quick-action {
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.quick-action:hover {
  transform: translateY(-1px);
}
.quick-action:active {
  transform: translateY(0) scale(0.97);
}

/* Primary zone — subtle entrance */
@keyframes zoneReveal {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.primary-zone {
  animation: zoneReveal 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Attachment row — hover slide */
.attachment-row {
  transition: background 0.15s ease, padding-left 0.15s ease;
}
.attachment-row:hover {
  padding-left: 12px;
}

/* New request button — subtle glow */
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 2px 8px rgba(196,112,75,0.15); }
  50% { box-shadow: 0 2px 16px rgba(196,112,75,0.3); }
}
.new-request-btn { animation: btnGlow 2.5s ease-in-out infinite; }
.new-request-btn:hover { animation: none; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(196,112,75,0.3); }
.new-request-btn:active { transform: translateY(0) scale(0.98); }

.hidden { display: none !important; }

/* ===== TOAST NOTIFICATIONS ===== */
.toast-container {
  position: fixed; top: 64px; right: 24px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; min-width: 280px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 3.7s forwards;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-8px); }
}
.toast .toast-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ===== DELIVERABLE PREVIEWS ===== */
.deliverable-preview {
  width: 100%; height: 120px; border-radius: 8px; overflow: hidden; 
  margin-bottom: 12px; border: 1px solid var(--border);
}
.deliverable-preview img {
  width: 100%; height: 100%; object-fit: cover;
}
.deliverable-preview iframe {
  width: 100%; height: 100%; border: none;
}
.deliverable-preview .link-preview {
  display: flex; align-items: center; justify-content: center;
  height: 100%; background: var(--bg-warm); color: var(--text-secondary);
  font-size: 13px; gap: 8px;
}

/* ===== TEMPLATE LIBRARY ===== */
.template-modal {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.template-modal.show { display: flex; opacity: 1; pointer-events: auto; }
.template-modal iframe {
  width: 90vw; height: 85vh; border: none;
  border-radius: 16px; background: white;
}
.template-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; padding: 24px; max-width: 800px; width: 90vw;
  background: var(--bg-card); border-radius: 16px; max-height: 80vh; overflow-y: auto;
}
.template-card {
  background: var(--bg-warm); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; cursor: pointer;
  transition: var(--transition); display: flex; flex-direction: column; gap: 8px;
}
.template-card:hover {
  transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.template-card-icon {
  width: 32px; height: 32px; border-radius: 8px; background: var(--accent);
  display: flex; align-items: center; justify-content: center; color: white;
  margin-bottom: 4px;
}
.template-card-title {
  font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.template-card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .chat-panel { width: 100%; min-width: 0; }
  .board-panel { display: none; }
  #managerView .mobile-board-toggle { display: flex; }
  .primary-zone .task-title { font-size: 22px; }
  .primary-zone { padding: 24px; }
  .request-drawer { width: 100%; right: 0; }
  .chat-widget { width: calc(100vw - 48px); right: 24px; }
}
</style>
</head>
<body>

<!-- View Selector -->
<div id="viewSelector">
  <div class="logo">The <span>Atelier</span></div>
  <div style="display: flex; align-items: center; gap: 24px;">
    <button id="themeToggle" onclick="toggleDarkMode()" style="background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 4px; display: flex; align-items: center; transition: color 0.2s;">
      <i data-lucide="moon" id="themeIcon" class="icon"></i>
    </button>
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('manager')">Manager</button>
      <button class="view-tab" onclick="switchView('designer')">Designer</button>
      <button class="view-tab" onclick="switchView('requester')">Requester</button>
    </div>
  </div>
</div>

<!-- MANAGER VIEW -->
<div id="managerView" class="view active">
  <div class="chat-panel">
    <div class="chat-header">
      <h2 class="heading">Command Center</h2>
      <p>The Atelier AI — managing your design team</p>
    </div>
    <div class="chat-messages" id="managerMessages"></div>
    <div class="quick-actions" id="managerQuickActions">
      <button class="quick-action" onclick="managerSend('triage queue')">Triage queue</button>
      <button class="quick-action" onclick="managerSend('what\'s behind?')">What's behind?</button>
      <button class="quick-action" onclick="managerSend('how\'s Daniel doing?')">How's Daniel?</button>
      <button class="quick-action" onclick="managerSend('how\'s Benjamin doing?')">How's Benjamin?</button>
    </div>
    <div class="chat-input-area">
      <input class="chat-input" id="managerInput" placeholder="Talk to The Atelier…" onkeydown="if(event.key==='Enter')managerSend()">
      <button class="chat-send" onclick="managerSend()">→</button>
    </div>
  </div>
  <div class="board-panel" id="boardPanel"></div>
</div>

<!-- DESIGNER VIEW -->
<div id="designerView" class="view">
  <div class="designer-picker">
    <button class="designer-btn active" onclick="switchDesigner('daniel')">Daniel</button>
    <button class="designer-btn" onclick="switchDesigner('benjamin')">Benjamin</button>
  </div>
  <div class="designer-content" id="designerContent"></div>
  
  <!-- Intercom-style chat widget -->
  <button class="chat-bubble" onclick="toggleChatWidget()">
    <i data-lucide="message-circle"></i>
  </button>
  <div class="chat-widget open" id="designerChatWidget">
    <div class="widget-header">
      <h3>Chat with Atelier</h3>
      <button class="widget-close" onclick="toggleChatWidget()">×</button>
    </div>
    <div class="widget-messages" id="designerMessages"></div>
    <div class="widget-input-area">
      <input class="chat-input" id="designerInput" placeholder="Talk to your coach…" onkeydown="if(event.key==='Enter')designerSend()">
      <button class="chat-send" onclick="designerSend()">→</button>
    </div>
  </div>
</div>

<!-- REQUESTER VIEW -->
<div id="requesterView" class="view">
  <!-- Header bar -->
  <div class="requester-header-bar">
    <h2>Design Requests</h2>
    <div style="display: flex; gap: 12px;">
      <button onclick="openDesignSystemModal()" style="padding: 10px 24px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 14px; font-weight: 500; cursor: pointer; transition: var(--transition);">Design System</button>
      <button class="new-request-btn" onclick="openRequestDrawer()">New Request</button>
    </div>
  </div>
  
  <!-- Queue view -->
  <div class="requester-queue-view" id="requesterQueueView">
    <!-- Pipeline overview will be rendered here -->
    <!-- Queue groups will be rendered here -->
  </div>
  
  <!-- New Request drawer -->
  <div class="request-drawer" id="requestDrawer">
    <div class="drawer-header">
      <h3>New Design Request</h3>
      <button class="drawer-close" onclick="closeRequestDrawer()">×</button>
    </div>
    <div class="drawer-messages" id="requesterMessages"></div>
    <div class="drawer-input-area">
      <input type="file" id="requesterFileInput" style="display:none" accept="image/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.fig,.sketch,.ai,.psd,.zip" onchange="handleRequesterAttachment(this)">
      <button class="attach-btn" onclick="document.getElementById('requesterFileInput').click()" title="Attach file or image" style="background:none;border:none;color:var(--text-tertiary);cursor:pointer;padding:4px;display:flex;align-items:center;transition:color 0.2s"><i data-lucide="paperclip" class="icon"></i></button>
      <input class="chat-input" id="requesterInput" placeholder="Describe what you need…" onkeydown="if(event.key==='Enter')requesterSend()">
      <button class="chat-send" onclick="requesterSend()">→</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal-box" id="taskModalContent">
    <button class="modal-close" onclick="closeTaskModal()">✕</button>
  </div>
</div>

<!-- TOAST NOTIFICATIONS -->
<div class="toast-container" id="toastContainer"></div>

<!-- DESIGN SYSTEM IFRAME MODAL -->
<div class="template-modal" id="designSystemModal" onclick="if(event.target===this)closeDesignSystemModal()">
  <iframe id="designSystemFrame" src=""></iframe>
</div>

<script>
// ===== DATA =====
const STATE = loadState() || getDefaultState();

function getDefaultState() {
  return {
    team: {
      daniel: { name: 'Daniel', role: 'Senior Designer', skills: ['brand', 'web', 'product'] },
      benjamin: { name: 'Benjamin', role: 'Junior Designer', skills: ['social', 'marketing', 'illustration'] }
    },
    tasks: {
      'ATL-001': {

function loadState() {
  try { const s = localStorage.getItem('atelier_state'); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}
function saveState() {
  try { localStorage.setItem('atelier_state', JSON.stringify(STATE)); } catch(e) {}
  // Debounced sync to Supabase
  clearTimeout(saveState._timer);
  saveState._timer = setTimeout(() => syncToSupabase(), 500);
}

// Sync all tasks to Supabase
async function syncToSupabase() {
  try {
    const tasks = Object.values(STATE.tasks);
    for (const task of tasks) {
      await fetch('/api/db?action=upsert-task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(task)
      });
    }
  } catch(e) { console.warn('Supabase sync failed:', e); }
}

// Load state from Supabase on startup
async function loadFromSupabase() {
  try {
    const res = await fetch('/api/db?action=load');
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    if (data.tasks && Object.keys(data.tasks).length > 0) {
      STATE.tasks = data.tasks;
      STATE.team = data.team;
      // Save to localStorage as cache
      localStorage.setItem('atelier_state', JSON.stringify(STATE));
      // Re-render everything
      renderBoard();
      if (document.getElementById('designerView').classList.contains('active')) renderDesigner();
      if (document.getElementById('requesterView').classList.contains('active')) renderRequesterQueue();
      console.log('Loaded from Supabase:', Object.keys(data.tasks).length, 'tasks');
    }
  } catch(e) { console.warn('Supabase load failed, using localStorage:', e); }
}

// Load from Supabase after initial render
setTimeout(loadFromSupabase, 1000);

// ===== CLAUDE API =====
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';

async function callClaude(systemPrompt, messages, maxTokens = 256) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ model: CLAUDE_MODEL, max_tokens: maxTokens, system: systemPrompt, messages })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  return data.content[0].text;
}

let managerInitDone = false;
let managerHistory = [];

const MANAGER_SYSTEM = `You are the Atelier — an AI project manager for Every.to's design team. You work directly with Lucas, the Creative Director who manages two designers (Daniel and Benjamin).

Your role is to be Lucas's strategic PM partner:
- **Triage incoming requests**: assess priority, suggest which designer should take it, flag capacity issues
- **Surface blockers and risks**: proactively warn about approaching deadlines, blocked tasks, overloaded designers
- **Move work around**: reassign tasks, update statuses, rebalance workload when Lucas asks
- **Give sharp status reports**: concise, actionable — not just data dumps
- **Think ahead**: if Daniel finishes his primary tomorrow, suggest what he should pick up next from the queue

You have full visibility into the board: who's working on what, capacity (1 primary + 2 interruptions per designer per week), deadlines, and blockers. Use it proactively.

IMPORTANT RULES:
- NEVER show internal task IDs (like ATL-001) to the user. Always refer to tasks by their TITLE only.
- When Lucas asks to assign/move/change a task, output action tags (hidden from display):
[ACTION:ASSIGN task_id=ATL-XXX assignee=daniel|benjamin]
[ACTION:STATUS task_id=ATL-XXX status=triaged|in-progress|review|complete|blocked]
- Keep responses concise (3-4 sentences). Be proactive — mention risks and suggestions unprompted.
- Don't use emojis.
- Use markdown: **bold** for emphasis, bullet lists with -
- Think like a senior PM — don't just answer questions, anticipate problems.`;

function getManagerContext() {
  let ctx = 'Current team state:\n\nTeam:\n';
  for (const [id, m] of Object.entries(STATE.team)) {
    ctx += `- ${m.name} (${m.role}): skills: ${m.skills.join(', ')}\n`;
  }
  ctx += '\nTasks:\n';
  for (const t of Object.values(STATE.tasks)) {
    ctx += `- ${t.id}: "${t.title}" | assignee: ${t.assignee || 'unassigned'} | type: ${t.type} | status: ${t.status} | progress: ${t.progress}% | due: ${t.due} | requester: ${t.requester} | priority: ${t.priority}`;
    if (t.blocker) ctx += ` | BLOCKER: ${t.blocker}`;
    ctx += '\n';
  }
  const danielInts = Object.values(STATE.tasks).filter(t => t.assignee === 'daniel' && t.type === 'interruption').length;
  const benjInts = Object.values(STATE.tasks).filter(t => t.assignee === 'benjamin' && t.type === 'interruption').length;
  ctx += `\nCapacity: Daniel ${danielInts}/2 interruption slots used. Benjamin ${benjInts}/2 interruption slots used.`;
  ctx += `\nEach designer has 1 primary task slot + 2 interruption slots per week.`;
  return ctx;
}

async function initManager() {
  if(managerInitDone) return;
  managerInitDone = true;
  managerHistory = [];
  const systemMsg = MANAGER_SYSTEM + '\n\n' + getManagerContext();
  managerHistory.push({ role: 'user', content: 'I just opened the dashboard. Give me a quick status update on the team.' });
  
  // Show typing

    typing.remove();

    _addMsg(container, reply, 'ai');
  } catch(e) {
    typing.remove();
    _addMsg(container, 'Having trouble connecting. Try again.', 'ai');
  }
}

function addMsg(containerId, html, type, delay = 0) {
  const container = document.getElementById(containerId);
  if(delay > 0) {
    // Show typing indicator
    const typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
    
    setTimeout(() => {
      typing.remove();
      _addMsg(container, html, type);
    }, delay);
  } else {
    _addMsg(container, html, type);
  }
}

function formatAiReply(text) {
  // Strip ATL-XXX references
  let html = text.replace(/ATL-\d{3}\s*[\(\[:]?\s*/g, '').replace(/[\)\]]\s*/g, ' ');
  // Markdown bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Markdown italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Newlines to <br>
  html = html.replace(/\n/g, '<br>');
  // Make task titles clickable — match known task titles
  for (const t of Object.values(STATE.tasks)) {
    const escaped = t.title.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(escaped, 'gi');
    html = html.replace(regex, `<span class="task-ref" onclick="openTaskModal('${t.id}')">${t.title}</span>`);
  }
  return html;
}

function _addMsg(container, html, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const processed = (type === 'ai') ? formatAiReply(html) : html;
  div.innerHTML = processed;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  lucide.createIcons();
}

async function managerSend(text) {
  const input = document.getElementById('managerInput');
  const msg = text || input.value.trim();
  if(!msg) return;
  input.value = '';
  
  addMsg('managerMessages', msg, 'user');
  clearHighlights();
  
  managerHistory.push({ role: 'user', content: msg });
  
  const container = document.getElementById('managerMessages');
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
  
  try {
    const systemMsg = MANAGER_SYSTEM + '\n\n' + getManagerContext();
    const reply = await callClaude(systemMsg, managerHistory, 400);
    typing.remove();
    managerHistory.push({ role: 'assistant', content: reply });
    
    // Parse and execute [ACTION:...] tags
    const actionRegex = /\[ACTION:(ASSIGN|STATUS)\s+(.+?)\]/g;
    let match;
    while ((match = actionRegex.exec(reply)) !== null) {
      const actionType = match[1];
      const params = match[2];
      if (actionType === 'ASSIGN') {
        const tidMatch = params.match(/task_id=(ATL-\d+)/);
        const assMatch = params.match(/assignee=(\w+)/);
        if (tidMatch && assMatch && STATE.tasks[tidMatch[1]]) {
          const task = STATE.tasks[tidMatch[1]];
          task.assignee = assMatch[1];
          if (task.type === 'queue') { task.type = 'interruption'; task.slot = 1; }
          if (task.status === 'queued') task.status = 'triaged';
          saveState(); renderBoard();
          setTimeout(() => highlightCard(tidMatch[1]), 300);
        }
      } else if (actionType === 'STATUS') {
        const tidMatch = params.match(/task_id=(ATL-\d+)/);
        const stMatch = params.match(/status=([\w-]+)/);
        if (tidMatch && stMatch && STATE.tasks[tidMatch[1]]) {
          const task = STATE.tasks[tidMatch[1]];
          task.status = stMatch[1];
          if (stMatch[1] === 'complete') { task.progress = 100; if (task.checklist) task.checklist.forEach(c => c.done = true); }
          saveState(); renderBoard();
          setTimeout(() => highlightCard(tidMatch[1]), 300);
        }
      }
    }
    
    // Clean action tags from display and render
    const cleanReply = reply.replace(/\[ACTION:.*?\]/g, '').trim();
    _addMsg(container, cleanReply, 'ai');
  } catch(e) {
    typing.remove();
    managerHistory.pop(); // remove failed user message
    _addMsg(container, 'Having trouble connecting. Try again.', 'ai');
  }
}

function renderCard(task, showAssignee) {
  if(!task) return '';
  const statusClass = task.status === 'in-progress' ? 'status-in-progress' :
    task.status === 'review' ? 'status-review' :
    task.status === 'blocked' ? 'status-blocked' :
    task.status === 'triaged' ? 'status-triaged' : 
    task.status === 'complete' ? 'status-complete' : 'status-queued';
  const statusLabel = task.status === 'in-progress' ? 'In Progress' :
    task.status === 'review' ? 'In Review' :
    task.status === 'blocked' ? 'Blocked' :
    task.status === 'triaged' ? 'Triaged' : 
    task.status === 'complete' ? 'Complete' : 'Queued';
  
  // Check for deliverable preview (only for real URLs, not placeholder '#')
  const deliverable = task.status === 'complete' && task.attachments ? 
    task.attachments.find(a => a.isDeliverable) : null;
  let deliverablePreview = '';
  if (deliverable && deliverable.url && deliverable.url.startsWith('http')) {
    if (deliverable.url.includes('figma.com')) {
      const embedUrl = `https://www.figma.com/embed?embed_host=atelier&url=${encodeURIComponent(deliverable.url)}`;
      deliverablePreview = `<div class="deliverable-preview"><iframe src="${embedUrl}"></iframe></div>`;
    } else if (deliverable.name.match(/\.(jpg|jpeg|png|gif|webp)$/i) || deliverable.url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
      deliverablePreview = `<div class="deliverable-preview"><img src="${deliverable.url}" alt="${deliverable.name}"></div>`;
    } else {
      deliverablePreview = `<div class="deliverable-preview"><div class="link-preview"><a href="${deliverable.url}" target="_blank" style="color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:6px"><i data-lucide="external-link" class="icon"></i>${deliverable.name}</a></div></div>`;
    }
  } else if (deliverable) {
    // File upload without real URL — show file name only
    deliverablePreview = `<div class="deliverable-preview"><div class="link-preview" style="justify-content:center"><i data-lucide="file-check" class="icon" style="color:var(--green)"></i><span style="color:var(--text-secondary)">${deliverable.name}</span></div></div>`;
  }
  
  return `
    <div class="task-card priority-${task.priority} ${task.status === 'blocked' ? 'blocked' : ''}" data-task-id="${task.id}" onclick="openTaskModal('${task.id}')">
      ${task.status === 'blocked' ? '<i data-lucide="alert-circle" class="icon blocked-icon" style="color:var(--red)"></i>' : ''}
      ${deliverablePreview}
      ${showAssignee ? `<div class="card-assignee">${task.assignee === 'daniel' ? 'Daniel' : task.assignee === 'benjamin' ? 'Benjamin' : 'Unassigned'}</div>` : ''}
      <div class="card-title">${task.title}</div>
      <div class="card-meta">
        <span class="card-status ${statusClass}">${statusLabel}</span>
        <span>${task.due}</span>
        <span>${task.requester}</span>
      </div>
      ${task.progress > 0 ? `<div class="card-progress"><div class="card-progress-bar" style="width:${task.progress}%"></div></div>` : ''}
    </div>
  `;
}

function renderSlot(task, num) {
  const statusClass = task.status === 'review' ? 'status-review' : task.status === 'blocked' ? 'status-blocked' : 'status-triaged';
  const statusLabel = task.status === 'review' ? 'In Review' : task.status === 'blocked' ? 'Blocked' : 'Triaged';
  return `
    <div class="slot-card filled ${task.status === 'blocked' ? 'blocked' : ''}" data-task-id="${task.id}" onclick="openTaskModal('${task.id}')" style="cursor:pointer">
      <div class="slot-label">Interruption ${num}</div>
      <div class="card-title" style="font-size:13px">${task.title}</div>
      <div class="card-meta" style="margin-top:4px">
        <span class="card-status ${statusClass}">${statusLabel}</span>
        <span>${task.due}</span>
      </div>
    </div>
  `;
}

function renderEmptySlot(name, num) {

async function submitDeliverable(taskId) {
  const fileInput = document.getElementById('deliverableFile');
  const linkInput = document.getElementById('deliverableLink');
  const task = STATE.tasks[taskId];
  
  const hasFile = fileInput.files.length > 0;
  const hasLink = linkInput.value.trim();
  
  if (!hasFile && !hasLink) {
    alert('Please provide either a file or link before marking complete.');
    return;
  }
  
  // Add deliverable attachment
  if (!task.attachments) task.attachments = [];
  
  if (hasFile) {
    const file = fileInput.files[0];
    let url = '#';
    // Upload to Supabase storage
    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': file.type, 'x-filename': file.name },
        body: file
      });
      const data = await res.json();
      if (data.url) url = data.url;
    } catch(e) { console.warn('Upload failed:', e); }
    
    task.attachments.push({
      type: 'deliverable', name: file.name, url,
      addedBy: STATE.team[STATE.currentDesigner].name,
      addedAt: new Date().toISOString().split('T')[0],
      isDeliverable: true
    });
  }
  
  if (hasLink) {
    const linkName = hasLink.includes('figma.com') ? 'Figma Design' : 'Final Deliverable';
    task.attachments.push({
      type: 'deliverable', name: linkName, url: linkInput.value.trim(),
      addedBy: STATE.team[STATE.currentDesigner].name,
      addedAt: new Date().toISOString().split('T')[0],
      isDeliverable: true
    });
  }
  
  // Mark task complete
  task.status = 'complete';
  task.progress = 100;
  if (task.checklist) task.checklist.forEach(c => c.done = true);
  
  saveState();
  renderBoard();
  renderDesigner();
  renderRequesterQueue();
  
  closeDeliverableModal();
  
  // Show chat message
  addMsg('designerMessages', 'Mark as complete', 'user');
  addMsg('designerMessages', `Great work! I've marked <strong>${task.title}</strong> as complete. Lucas and the requester have been notified. \n\nReady for your next task — check with Lucas or I can pull something from the queue.`, 'ai', 500);
  toggleChatWidget(true);
}

function getRequesterSystemPrompt() {
  // Build workload context for expectation setting
  const tasks = Object.values(STATE.tasks);
  const danielPrimary = tasks.find(t => t.assignee === 'daniel' && t.type === 'primary');
  const benjPrimary = tasks.find(t => t.assignee === 'benjamin' && t.type === 'primary');
  const danielInts = tasks.filter(t => t.assignee === 'daniel' && t.type === 'interruption').length;
  const benjInts = tasks.filter(t => t.assignee === 'benjamin' && t.type === 'interruption').length;
  const queueDepth = tasks.filter(t => t.type === 'queue').length;

  let workloadCtx = `\nCurrent workload:`;
  workloadCtx += `\n- Daniel: ${danielPrimary ? 'Primary: ' + danielPrimary.title + ' (due ' + danielPrimary.due + ')' : 'No primary'}, ${danielInts}/2 interruption slots used`;
  workloadCtx += `\n- Benjamin: ${benjPrimary ? 'Primary: ' + benjPrimary.title + ' (due ' + benjPrimary.due + ')' : 'No primary'}, ${benjInts}/2 interruption slots used`;
  workloadCtx += `\n- Queue depth: ${queueDepth} tasks waiting`;

  let sys = `You are the Atelier — the intake interviewer for Every.to's design team. Your ONE job is to interview requesters and create well-formed task cards for the designers.

You are NOT a general assistant. You don't answer random questions. You interview people who need design work done.

## Interview Flow (ask ONE question at a time, keep it to 7-9 messages total)

1. **Who are you?** — Ask their name and team. If you recognize them from known people, greet them warmly and skip this.

2. **What do you need designed?** — Let them describe naturally. Banner, landing page, social kit, presentation, illustration, product UI, etc.

3. **Where will it live?** — Website (which page?), social media (which platforms?), email, print, presentation, etc.

4. **What's it for?** — Quick context: a launch, campaign, rebrand? One sentence is enough.

5. **References or files?** — Any inspiration, brand assets, links, or files to share? If they mention attaching something, acknowledge it and note it in the task.

6. **The Copy Gate (HARD RULE):**
   Ask if their text/copy is ready.
   - If the asset NEEDS text (banners, landing pages, social posts, presentations, emails, reports):
     - Copy 80%+ ready → Collect it, move on.
     - Copy NOT ready → Firmly but kindly: "The design team needs at least 80% of copy finalized before starting — designing around placeholder text leads to rework. Come back when your draft is ready and we'll get you in fast." END the conversation. Output [REQUEST_INCOMPLETE].
   - If the asset does NOT need text (icons, illustrations, abstract graphics, photo editing): Skip this. Note "N/A — no text needed."

7. **When do you need it?** — Accept their answer.

8. **How urgent?** — "Is this blocking a launch or deadline, or is there flexibility?" Classify:
   - URGENT: ≤3 days or blocking something external
   - IMPORTANT: 1-2 weeks, tied to a real event
   - STANDARD: Flexible, no hard deadline

9. **Set expectations based on workload:**
${workloadCtx}
   - If designers have capacity: "Looks like we can get this started soon."
   - If busy but queue is short: "Both designers are on active projects, but you should get picked up within about a week."
   - If packed: Be honest — "Both designers are fully loaded and there are ${queueDepth} requests ahead of you. With your timeline, that could be tight. I'll flag it for Lucas to prioritize."

10. **Confirm and submit.**

## Output Format

[REQUEST_COMPLETE]
Title: {short title, 5-8 words}
Type: {banner/landing-page/social-media/presentation/email/illustration/product-ui/report/other}
Destination: {where it lives}
Purpose: {one line}
Format: {specs if discussed}
Deadline: {when}
Urgency: {urgent/important/standard}
Copy: {ready/not-needed}
Requester: {name}
Department: {team}
References: {links/notes or "none"}
Checklist: {1-5 designer steps, pipe-separated}

Generate the checklist based on what the requester described. Examples:
- Landing page: "Create wireframes | Design hero section | Build content sections | Mobile responsive | Stakeholder review"
- Social kit: "Create mood board | Design Instagram templates | Design Twitter assets | Create story templates"
- Banner: "Review brand guide | Design banner layout | Add final copy | Export for web"

For incomplete requests (copy not ready):
[REQUEST_INCOMPLETE]
Requester: {name}
Department: {team}
Reason: Copy not ready
Notes: {what they wanted}

## Rules
- Ask ONE question at a time. Never bundle.
- Keep responses to 1-3 sentences. Be warm but efficient.
- Don't use emojis. Don't say "Great!" or "Perfect!" after every answer.
- If they give multiple answers at once, adapt — don't re-ask what you already know.
- The whole interview should take 5-10 minutes, 7-9 messages.
- You are ONLY for design requests. If someone asks something unrelated, redirect: "I'm here to help with design requests — what does your team need designed?"
- NEVER show internal task IDs. Refer to tasks by title only.
- If someone mentions attaching a file or image, acknowledge it and note it will be attached to the task card.`;

  // Inject known people context
  const people = getKnownPeople();
  if (Object.keys(people).length > 0) {
    sys += '\n\nKnown people (from previous visits):';
    for (const [key, p] of Object.entries(people)) {
      sys += `\n- ${p.name}${p.department ? ' (' + p.department + ')' : ''}${p.lastRequest ? ', last request: ' + p.lastRequest : ''}`;
    }
  }

  // Inject existing tasks for status lookups
  const activeTasks = Object.values(STATE.tasks).filter(t => t.status !== 'complete');
  if (activeTasks.length > 0) {
    sys += '\n\nCurrent tasks in the system:';
    for (const t of activeTasks) {
      sys += `\n- ${t.id}: "${t.title}" | requester: ${t.requester} | status: ${t.status} | assignee: ${t.assignee || 'unassigned'} | due: ${t.due}`;
      if (t.blocker) sys += ` | BLOCKED: ${t.blocker}`;
    }
  }

  return sys;
}

let requesterAttachments = [];

async function handleRequesterAttachment(input) {
  const file = input.files[0];
  if (!file) return;
  
  const attachment = { type: 'file', name: file.name, url: '#', addedBy: requesterPerson || 'Requester', addedAt: new Date().toISOString().split('T')[0] };
  requesterAttachments.push(attachment);
  
  // Upload to storage
  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': file.type, 'x-filename': file.name },
      body: file
    });
    const data = await res.json();
    if (data.url) attachment.url = data.url;
  } catch(e) { console.warn('Upload failed:', e); }
  
  // Show in chat
  const container = document.getElementById('requesterMessages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<i data-lucide="paperclip" class="icon icon-sm"></i> <strong>${file.name}</strong>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  lucide.createIcons();
  
  // Tell the AI about it
  requesterHistory.push({ role: 'user', content: `[Attached file: ${file.name}]` });
  
  // AI acknowledges
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
  
  callClaude(getRequesterSystemPrompt(), requesterHistory, 128).then(reply => {
    typing.remove();
    requesterHistory.push({ role: 'assistant', content: reply });
    _addMsg(container, reply, 'ai');
  }).catch(() => {
    typing.remove();
    _addMsg(container, 'Got it, file noted.', 'ai');
  });
  
  input.value = '';
}

async function requesterSend() {
  const input = document.getElementById('requesterInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  addMsg('requesterMessages', msg, 'user');
  
  requesterHistory.push({ role: 'user', content: msg });
  
  const container = document.getElementById('requesterMessages');
  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;
  
  try {
    const reply = await callClaude(getRequesterSystemPrompt(), requesterHistory, 256);
    typing.remove();
    requesterHistory.push({ role: 'assistant', content: reply });
    
    // Parse [REQUEST_COMPLETE] if present
    if (reply.includes('[REQUEST_COMPLETE]')) {
      const lines = reply.split('\n');
      const data = {};
      for (const line of lines) {
        const m = line.match(/^\s*(Title|Purpose|Format|Deadline|Copy|Requester|Department|Checklist):\s*(.+)/i);
        if (m) data[m[1].toLowerCase()] = m[2].trim();
      }
      
      if (data.title) {
        // Save person
        if (data.requester) {
          requesterPerson = data.requester;
          savePerson(data.requester, { department: data.department || '' });
        }
        
        // Parse checklist items
        let checklist = [];
        if (data.checklist) {
          checklist = data.checklist.split('|').map(item => ({
            text: item.trim(),
            done: false
          })).filter(item => item.text.length > 0);
        }
        
        // Create task
        const taskNum = Object.keys(STATE.tasks).length + 1;
        const taskId = 'ATL-' + String(taskNum).padStart(3, '0');
        STATE.tasks[taskId] = {
          id: taskId, title: data.title, assignee: null, type: 'queue',
          status: 'queued', progress: 0, due: data.deadline || 'TBD',
          requester: data.requester || 'Unknown', requestedBy: data.requester || 'Unknown',
          brief: `${data.purpose || ''}. Format: ${data.format || 'TBD'}.`,
          priority: 'medium', urgency: data.urgency || 'standard',
          checklist: checklist, attachments: [...requesterAttachments],
          conversationHistory: [...requesterHistory]
        };
        saveState();
        renderBoard();
        renderRequesterQueue();
        requesterAttachments = []; // Reset for next request
        
        // Show toast notification
        showToast('New request: ' + data.title, 'var(--green)');
      }
      
      // Show a clean version (remove the raw tag block, show summary card)
      const cleanReply = reply.replace(/\[REQUEST_COMPLETE\][\s\S]*$/, '').trim();
      let displayMsg = cleanReply || 'Your request has been submitted.';
      if (data.title) {
        const queuePos = Object.values(STATE.tasks).filter(t => t.type === 'queue').length;
        displayMsg += `\n\n<div class="summary-card">`;
        displayMsg += `<div class="sc-title">${data.title}</div>`;
        if (data.purpose) displayMsg += `<div class="sc-row"><span><i data-lucide="clipboard" class="icon icon-sm"></i></span> ${data.purpose}</div>`;
        if (data.format) displayMsg += `<div class="sc-row"><span><i data-lucide="ruler" class="icon icon-sm"></i></span> ${data.format}</div>`;
        if (data.deadline) displayMsg += `<div class="sc-row"><span><i data-lucide="calendar" class="icon icon-sm"></i></span> ${data.deadline}</div>`;
        displayMsg += `<div class="sc-row"><span><i data-lucide="pen-tool" class="icon icon-sm"></i></span> Copy: ${data.copy || 'unknown'}</div>`;
        displayMsg += `</div>\n\nYou're <strong>#${queuePos}</strong> in the queue.`;
      }
      _addMsg(container, displayMsg, 'ai');
    } else {
      // Try to detect person name from early conversation for memory
      if (!requesterPerson && requesterHistory.length <= 6) {
        // Simple heuristic: if user gave a short response (likely a name) early on
        const userMsgs = requesterHistory.filter(m => m.role === 'user');
        if (userMsgs.length === 2 && userMsgs[1].content.split(' ').length <= 3) {
          const name = userMsgs[1].content.replace(/^(i'm |my name is |it's |hey,? i'm )/i, '').replace(/[.!]$/,'').trim();
          if (name.length > 1 && name.length < 30) {
            requesterPerson = name;
            savePerson(name, {});
          }
        }
      }
      _addMsg(container, reply, 'ai');
    }
  } catch(e) {
    typing.remove();
    requesterHistory.pop();
    _addMsg(container, 'Having trouble connecting. Try again.', 'ai');
  }
}

// ===== REQUESTER QUEUE VIEW =====
function renderRequesterQueue() {
  const container = document.getElementById('requesterQueueView');
  const tasks = Object.values(STATE.tasks);

  // Pipeline counts
  const counts = {
    'in-progress': tasks.filter(t => t.status === 'in-progress').length,
    'review': tasks.filter(t => t.status === 'review').length,  
    'blocked': tasks.filter(t => t.status === 'blocked').length,
    'triaged': tasks.filter(t => t.status === 'triaged').length,
    'queued': tasks.filter(t => t.status === 'queued').length,
    'complete': tasks.filter(t => t.status === 'complete').length
  };

  // Group tasks by status
  const groups = {
    'In Progress': tasks.filter(t => t.status === 'in-progress'),
    'In Review': tasks.filter(t => t.status === 'review'),
    'Blocked': tasks.filter(t => t.status === 'blocked'),
    'Waiting': tasks.filter(t => t.status === 'triaged' || t.status === 'queued'),
    'Completed': tasks.filter(t => t.status === 'complete')
  };

  const statusColor = (s) => {
    if (s === 'in-progress') return 'var(--green)';
    if (s === 'review') return 'var(--purple)';
    if (s === 'blocked') return 'var(--red)';
    if (s === 'triaged' || s === 'queued') return 'var(--gold)';
    if (s === 'complete') return 'var(--text-tertiary)';
    return 'var(--text-tertiary)';
  };

  const statusLabel = (s) => {
    if (s === 'in-progress') return 'In Progress';
    if (s === 'review') return 'In Review';
    if (s === 'blocked') return 'Blocked';
    if (s === 'triaged') return 'Triaged';
    if (s === 'queued') return 'Queued';
    if (s === 'complete') return 'Complete';
    return s;
  };

  const columns = [
    { key: 'Waiting', color: 'var(--gold)', tasks: groups['Waiting'] },
    { key: 'In Progress', color: 'var(--green)', tasks: groups['In Progress'] },
    { key: 'In Review', color: 'var(--purple)', tasks: groups['In Review'] },
    { key: 'Blocked', color: 'var(--red)', tasks: groups['Blocked'] },
    { key: 'Completed', color: 'var(--text-tertiary)', tasks: groups['Completed'] }
  ];

  let html = `<div class="kanban-board">`;

  for (const col of columns) {
    html += `
      <div class="kanban-column">
        <div class="kanban-column-header">
          <div class="col-dot" style="background:${col.color}"></div>
          ${col.key}
          <span class="queue-count">${col.tasks.length}</span>
        </div>
        <div class="kanban-column-cards">
          ${col.tasks.length === 0 ? `<div style="font-size:12px;color:var(--text-tertiary);padding:12px;text-align:center">No tasks</div>` :
            col.tasks.map(task => {
              // Check for deliverable preview (only real URLs)
              const deliverable = task.status === 'complete' && task.attachments ? 
                task.attachments.find(a => a.isDeliverable) : null;
              let deliverablePreview = '';
              if (deliverable && deliverable.url && deliverable.url.startsWith('http')) {
                if (deliverable.url.includes('figma.com')) {
                  const embedUrl = `https://www.figma.com/embed?embed_host=atelier&url=${encodeURIComponent(deliverable.url)}`;
                  deliverablePreview = `<div class="deliverable-preview"><iframe src="${embedUrl}"></iframe></div>`;
                } else if (deliverable.name.match(/\.(jpg|jpeg|png|gif|webp)$/i) || deliverable.url.match(/\.(jpg|jpeg|png|gif|webp)/i)) {
                  deliverablePreview = `<div class="deliverable-preview"><img src="${deliverable.url}" alt="${deliverable.name}"></div>`;
                } else {
                  deliverablePreview = `<div class="deliverable-preview"><div class="link-preview"><a href="${deliverable.url}" target="_blank" style="color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:6px"><i data-lucide="external-link" class="icon"></i>${deliverable.name}</a></div></div>`;
                }
              } else if (deliverable) {
                deliverablePreview = `<div class="deliverable-preview"><div class="link-preview" style="justify-content:center"><i data-lucide="file-check" class="icon" style="color:var(--green)"></i><span style="color:var(--text-secondary)">${deliverable.name}</span></div></div>`;
              }
              
              return `
                <div class="queue-card" onclick="openTaskModalReadOnly('${task.id}')">
                  ${deliverablePreview}
                  <div class="queue-card-title">${task.title}</div>
                  <div class="queue-card-meta">
                    <span class="queue-card-assignee">${task.assignee ? STATE.team[task.assignee]?.name || task.assignee : 'Unassigned'}</span>
                    <span>Due ${task.due}</span>
                  </div>
                  <div class="queue-card-meta" style="margin-top:2px">
                    <span>${task.requester}</span>
                  </div>
                  ${task.progress > 0 ? `
                    <div class="queue-card-progress">
                      <div class="queue-card-progress-bar" style="width:${task.progress}%"></div>
                    </div>
                  ` : ''}
                </div>
              `;
            }).join('')}
        </div>
      </div>
    `;
  }

  html += `</div>`;

  container.innerHTML = html;
  lucide.createIcons();
}
